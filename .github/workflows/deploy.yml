name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: wallet-devcertifit
  REGION: europe-north1
  REPO_NAME: wallet-app
  SERVICE_NAME: wallet-app

jobs:
  deploy:
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-level: '3.11'
          cache: 'pip'

      - name: Install Linting & Testing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Run Linter
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # Authenticate with GCP.
      # Recommend configuring Workload Identity Federation:
      # https://github.com/google-github-actions/auth#workload-identity-federation
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Note: If using Service Account Key, save it in GitHub Secret as GCP_SA_KEY
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Container Image
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          # Pass environment variables and secrets to Cloud Run
          # Example:
          # env_vars: |
          #   DEBUG=False
          #   DJANGO_SETTINGS_MODULE=wallet_platform.settings
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            APPLE_PASS_CERT=APPLE_PASS_CERT:latest
            APPLE_PASS_KEY=APPLE_PASS_KEY:latest
            APPLE_WWDR_CERT=APPLE_WWDR_CERT:latest
            GOOGLE_SERVICE_ACCOUNT_EMAIL=GOOGLE_SERVICE_ACCOUNT_EMAIL:latest
            GOOGLE_SERVICE_ACCOUNT_KEY=GOOGLE_SERVICE_ACCOUNT_KEY:latest
          flags: '--allow-unauthenticated --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:wallet-db'
